title: "The Macon Melody v. Bibb County School District"
description: >-
  A citizen's guide to Civil Action No. 2025-CV-083495 — the Georgia Open
  Records Act case over disclosure of a Bibb County School District
  settlement amount. Annotated court filings, timelines, and legal
  concepts explained in plain English.

remote_theme: just-the-docs/just-the-docs

url: "https://civicpulse.github.io"
baseurl: "/Melody-v-BCSD"

permalink: pretty

# just-the-docs settings
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/CivicPulse/Melody-v-BCSD"

aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Prepared and maintained by <a href="https://www.kerryhatcher.com">Kerry Hatcher</a>
  / CivicPulse. Source filings from Bibb County Superior Court via Tyler
  re:SearchGA. This site is an independent citizen-journalism project and is
  not affiliated with the court, the plaintiff, or the defendant. Nothing here
  is legal advice.

color_scheme: light

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  key:
    title: Key point
    color: yellow

# Collections for the filings
collections:
  filings:
    permalink: "/filings/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: "filings"
    values:
      layout: default
      parent: "Court Filings"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# File exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .bundle/
  - node_modules/

include:
  - pdfs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
