title: "The Macon Melody v. Bibb County School District"
description: >-
  A citizen's guide to Civil Action No. 2025-CV-083495 — the Georgia Open
  Records Act case over disclosure of a Bibb County School District
  settlement amount. Annotated court filings, timelines, and legal
  concepts explained in plain English.

remote_theme: just-the-docs/just-the-docs

url: "https://civicpulse.github.io"
baseurl: "/Melody-v-BCSD"

permalink: pretty

# Social link previews (consumed by jekyll-seo-tag).
# Note: jekyll-seo-tag reads og:image from page.image only, not site.image,
# so we inject it via the `defaults:` block below. Keeping `logo:` here for
# JSON-LD structured data. No twitter block until we have a real handle —
# the template defaults twitter:card to summary_large_image on its own, and
# adding twitter: without username produces a broken twitter:site meta.
logo: /assets/images/logo.svg
author:
  name: Kerry Hatcher
  url: https://www.kerryhatcher.com
social:
  name: CivicPulse
  links:
    - https://github.com/CivicPulse

# just-the-docs settings
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/CivicPulse/Melody-v-BCSD"

aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Prepared and maintained by <a href="https://www.kerryhatcher.com">Kerry Hatcher</a>
  / CivicPulse. Source filings from Bibb County Superior Court via Tyler
  re:SearchGA. This site is an independent citizen-journalism project and is
  not affiliated with the court, the plaintiff, or the defendant. Nothing here
  is legal advice.

color_scheme: light

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  key:
    title: Key point
    color: yellow

# Collections for the filings
collections:
  filings:
    permalink: "/filings/:path/"
    output: true

defaults:
  # Inject a default Open Graph / Twitter image onto every document.
  # Per-page frontmatter `image:` overrides this.
  - scope:
      path: ""
    values:
      image:
        path: /assets/images/og-default.png
        width: 1200
        height: 630
        alt: "The Macon Melody v. Bibb County School District — a Georgia Open Records Act case."
  - scope:
      path: ""
      type: "filings"
    values:
      layout: default
      parent: "Court Filings"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# File exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CASE_REPORT.md
  - vendor/
  - .bundle/
  - node_modules/

include:
  - pdfs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
