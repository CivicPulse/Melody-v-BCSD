<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1c3d"/>

  <!-- Gold left-edge rule -->
  <rect x="72" y="72" width="4" height="520" fill="#c9a23a"/>

  <!-- Eyebrow: docket label -->
  <text x="104" y="148"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" letter-spacing="3"
        fill="#c9a23a">
    CIVIL ACTION NO. 2025-CV-083495 &#xB7; BIBB COUNTY SUPERIOR COURT
  </text>

  <!-- Primary headline -->
  <text x="104" y="292"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="92"
        fill="#ffffff">
    The Macon Melody
  </text>

  <!-- Defendant -->
  <text x="104" y="390"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="58"
        fill="#ffffff">
    v. Bibb County School District
  </text>

  <!-- Tagline -->
  <text x="104" y="510"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36"
        fill="#ffffff">
    Public money. Public settlement. Public right to know?
  </text>

</svg>
